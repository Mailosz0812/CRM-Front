<div class="h-full w-full flex justify-center items-start">
  <div class="card gap-4 w-full max-w-4xl p-10 lg:mt-10">
    <div class="w-full border-b border-gray-200">
    <h2 class="font-bold text-gray-800 pb-1 mb-1 text-xl">Dane podstawowe</h2>
    </div>

    <div class="flex flex-col gap-5 mb-3 flex-1 pr-2">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">

        @if(_clientState | async; as client){
        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Nazwa Klienta</span>
            <span class="text-lg font-medium text-gray-900 leading-tight">{{client.name}}</span>
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">NIP</span>
            <span class="text-lg font-medium text-gray-900 tracking-wider">{{client.nipNumber}}</span>
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Adres</span>
            <span class="text-lg font-medium text-gray-900">{{client.address}}</span>
          </div>
        </div>

        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Telefon</span>
            <span class="text-lg font-medium text-gray-900">{{client.phone}}</span>
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">E-mail</span>
            <span class="text-lg font-medium text-gray-900 text-emerald-600 underline decoration-emerald-100 underline-offset-4">{{client.mail}}</span>
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Osoba decyzyjna</span>
            <span class="text-lg font-medium text-gray-900">{{client.decisionPerson}}</span>
          </div>
        </div>
        }

      </div>
    </div>
  </div>
</div>
