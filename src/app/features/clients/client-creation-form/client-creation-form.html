<div class="h-full w-full flex justify-center items-start">
  <div class="card gap-4 w-full max-w-4xl p-10 lg:mt-10">
    <div class="flex items-center justify-between shrink-0 w-full">
      <h1 class=" text-2xl font-bold text-gray-900">Nowy klient</h1>
      <button class="px-6 py-2 bg-primary text-white font-bold rounded-lg shadow-sm hover:bg-primary-dark transition-colors">
        Utwórz klienta
      </button>
    </div>
    <form class="flex flex-col md:grid md:grid-cols-2 gap-6 flex-1 w-full">
      <div class="flex flex-col gap-1 lg:col-span-2">
        <label class=" font-semibold text-gray-700">Nazwa Klienta</label>
        <input type="text" placeholder="Wprowadź pełną nazwę..." class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
      <div class="flex flex-col gap-1 :col-span-2">
        <label class=" font-semibold text-gray-700">Adres</label>
        <input type="text" placeholder="ul. Przykładowa 12/3, 00-000 Miasto" class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
      <div class="flex flex-col gap-1">
        <label class=" font-semibold text-gray-700">NIP</label>
        <input type="text" placeholder="0000000000" class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
      <div class="flex flex-col gap-1">
        <label class=" font-semibold text-gray-700">Telefon</label>
        <input type="text" placeholder="+48 000 000 000" class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
      <div class="flex flex-col gap-1">
        <label class=" font-semibold text-gray-700">E-mail</label>
        <input type="email" placeholder="przyklad@domena.pl" class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
      <div class="flex flex-col gap-1">
        <label class=" font-semibold text-gray-700">Osoba decyzyjna</label>
        <input type="text" placeholder="Imię i nazwisko" class="w-full px-3 py-2 text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-shadow">
      </div>
    </form>
  </div>
</div>
