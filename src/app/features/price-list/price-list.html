<div class="h-full w-full flex flex-col">
  <div class="flex flex-1 flex-col xl:flex-row gap-4 xl:min-h-0">
    <app-client-master/>
    <div class="w-full flex flex-col xl:grid xl:grid-cols-2 gap-4 flex-1 xl:min-h-0">
      <div class="border border-gray-200 rounded-xl shadow-sm flex flex-col bg-white xl:min-h-0">


        <div class="p-4 border-b border-gray-100 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between shrink-0">
          <h2 class="text-base font-bold text-gray-800">Cennik Marzec</h2>
          <div class="flex-col sm:flex-row flex gap-2">
            <app-button-small class="w-full sm:w-auto" [isFullWidth] = "true" [buttonText]="'Edytuj cennik'" [hidden]="editPriceListMode" (clickEvent) = "onEditList()"></app-button-small>
            <app-button-small class="w-full sm:w-auto" [isFullWidth] = "true" [buttonText]="'Zapisz'" [hidden]="!editPriceListMode" (clickEvent) = "onEditList()"></app-button-small>
            <app-button-small class="w-full sm:w-auto" [isFullWidth] = "true" [buttonText]="'Powrót'" [hidden]="!editPriceListMode" (clickEvent) = "onCancelList()"></app-button-small>
            <button [hidden]="editPriceListMode" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 shadow-sm">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
              Wydruk
            </button>
            <button [hidden]="!editPriceListMode" class="px-3 py-1.5 font-medium text-primary bg-primary/10 hover:bg-primary/20 rounded-lg transition-colors flex items-center justify-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
              Dodaj pozycję
            </button>
          </div>
        </div>


        <div class="flex-1 xl:overflow-y-auto xl:min-h-0">
          <table class="w-full text-left h-full">

            <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500 sticky top-0 z-10 shadow-sm">
            <tr>
              <th class="py-3 px-4 font-bold border-b border-gray-200">Produkt</th>
              <th class="py-3 px-4 font-bold text-right border-b border-gray-200">Cena jednostkowa</th>
              <th class="py-3 px-4 font-bold text-right bg-green-50/50 border-b border-gray-200">Marża</th>
            </tr>
            </thead>

            <tbody class="divide-y divide-gray-100 bg-white align-top">

              @if (editPriceListMode) {
                <tr class="bg-green-50/30 border-l-4 border-l-green-500 shadow-sm transition-all">
                  <td class="py-3 px-4">
                    <div class="relative">
                      <select class="w-full text-sm py-2 pl-3 pr-8 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary shadow-sm font-semibold text-gray-800 appearance-none cursor-pointer transition-shadow">
                        <option value="" disabled selected>Wybierz produkt</option>
                        <option value="KIE-ZYW-01">Kiełbasa żywiecka premium — 24,50 zł</option>
                        <option value="WED-300-101">Kabanosy krakus XL — 41,00 zł</option>
                        <option value="SZY-DEB-05">Szynka dębowa (Kawałek) — 32,90 zł</option>
                      </select>
                      <svg class="w-4 h-4 text-gray-400 absolute right-3 top-2.5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                  </td>
                  <td class="py-3 px-4 text-right text-gray-500 font-medium whitespace-nowrap">-- zł</td>
                  <td class="py-3 px-4 text-right whitespace-nowrap"><span class="text-gray-400">--</span></td>
                </tr>
              }

            <tr class="hover:bg-gray-50 transition-colors group">
              <td class="py-2">
                <div class="flex items-center">
                  <button class="px-4 py-2 text-sm text-gray-400" [hidden]="!editPriceListMode" title="Usuń z cennika">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </button>
                  <div [class.px-4] = "!editPriceListMode">
                    <p class="font-semibold text-gray-900">Kiełbasa żywiecka premium</p>
                    <p class="text-[13px] text-gray-400 font-mono mt-0.5">SKU: KIE-ZYW-01</p>
                  </div>
                </div>
              </td>
              <td class="py-3 px-4 text-right text-gray-800 font-bold">24,50 zł</td>
              <td class="py-3 px-4 text-right bg-green-50/30">
                <p class="font-bold text-green-600">+ 6,50 zł</p>
                <p class="text-[10px] font-medium text-green-600/70">26%</p>
              </td>
            </tr>

            <tr class="hover:bg-gray-50 transition-colors group">
              <td class="py-2">
                <div class="flex items-center">
                  <button class="px-4 py-2 text-sm text-gray-400" [hidden]="!editPriceListMode" title="Usuń z cennika">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </button>
                  <div [class.px-4] = "!editPriceListMode">
                    <p class="font-semibold text-gray-900">Kabanosy Krakus</p>
                    <p class="text-[13px] text-gray-400 font-mono mt-0.5">SKU: KRAK-120</p>
                  </div>
                </div>
              </td>
              <td class="py-3 px-4 text-right text-gray-800 font-bold">6,50 zł</td>
              <td class="py-3 px-4 text-right bg-green-50/30">
                <p class="font-bold text-green-600">+ 2,50 zł</p>
                <p class="text-[10px] font-medium text-green-600/70">21%</p>
              </td>
            </tr>

            <tr class="h-full border-0 pointer-events-none">
              <td colspan="3"></td>
            </tr>
            </tbody>


          </table>
        </div>
      </div>
      <div class="card xl:min-h-0">
        <div class="flex items-center justify-between mb-4 shrink-0">
          <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">
            Historia cenników
          </h3>
        </div>

        <div class="w-full flex-1 xl:min-h-0 xl:overflow-y-auto pr-2 custom-scrollbar">

          <div class="border border-gray-200 rounded-xl overflow-hidden flex flex-col divide-y divide-gray-100">

            <button class="w-full p-4 flex items-center justify-between bg-green-50/40 border-l-4 border-l-green-500 transition-colors text-left">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-white rounded-lg shadow-sm border border-green-100 text-green-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                  <p class="font-bold text-gray-900">Marzec 2026</p>
                  <p class="text-[13px] text-green-600 font-medium mt-0.5">Obecnie przeglądany</p>
                </div>
              </div>
            </button>
            <button class="w-full p-4 flex items-center justify-between hover:bg-gray-50 border-l-4 border-l-transparent transition-colors group text-left">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-gray-50 rounded-lg border border-gray-100 text-gray-400 group-hover:text-gray-600 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                  <p class="font-semibold text-gray-700 group-hover:text-gray-900 transition-colors">Luty 2026</p>
                  <p class="text-[13px] text-gray-400 mt-0.5">Zakończony 31 lut</p>
                </div>
              </div>
              <svg class="w-5 h-5 text-gray-300 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button class="w-full p-4 flex items-center justify-between hover:bg-gray-50 border-l-4 border-l-transparent transition-colors group text-left">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-gray-50 rounded-lg border border-gray-100 text-gray-400 group-hover:text-gray-600 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                  <p class="font-semibold text-gray-700 group-hover:text-gray-900 transition-colors">Styczeń 2026</p>
                  <p class="text-[13px] text-gray-400 mt-0.5">Zakończony 31 sty</p>
                </div>
              </div>
              <svg class="w-5 h-5 text-gray-300 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button class="w-full p-4 flex items-center justify-between hover:bg-gray-50 border-l-4 border-l-transparent transition-colors group text-left">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-gray-50 rounded-lg border border-gray-100 text-gray-400 group-hover:text-gray-600 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                  <p class="font-semibold text-gray-700 group-hover:text-gray-900 transition-colors">Grudzień 2025</p>
                  <p class="text-[13px] text-gray-400 mt-0.5">Zakończony 31 gru</p>
                </div>
              </div>
              <svg class="w-5 h-5 text-gray-300 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>

            <button class="w-full p-4 flex items-center justify-between hover:bg-gray-50 border-l-4 border-l-transparent transition-colors group text-left">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-gray-50 rounded-lg border border-gray-100 text-gray-400 group-hover:text-gray-600 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                  <p class="font-semibold text-gray-700 group-hover:text-gray-900 transition-colors">Listopad 2025</p>
                  <p class="text-[13px] text-gray-400 mt-0.5">Zakończony 30 lis</p>
                </div>
              </div>
              <svg class="w-5 h-5 text-gray-300 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
