<button
  [class.w-full]="isFullWidth"
  type="submit"
  [attr.form]="formId || null"
  [disabled]="disabled"
  class="text-sm font-medium text-white transition-colors shadow-sm px-4 py-2.5 bg-primary hover:bg-primary-dark rounded-md disabled:opacity-50"
  (click)="onClick()">
{{buttonText}}
</button>
